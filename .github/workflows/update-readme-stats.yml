name: Update README stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

concurrency:
  group: update-readme-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar SVGs
        env:
          STATS_BASE: ${{ vars.README_STATS_URL }}
        run: |
          BASE="${STATS_BASE:-https://github-readme-stats.vercel.app}"
          BASE="${BASE%/}"
          mkdir -p assets

          retry_curl() {
            local url="$1" out="$2"
            local n=0
            rm -f "$out"
            until curl -fsSL --max-time 120 -A "Mozilla/5.0 (compatible; GitHub-Actions)" "$url" -o "$out"; do
              rm -f "$out"
              n=$((n+1))
              if [ "$n" -ge 10 ]; then
                return 1
              fi
              sleep 25
            done
            if ! grep -q '<svg' "$out" 2>/dev/null; then
              rm -f "$out"
              return 1
            fi
            return 0
          }

          fetch_or_keep() {
            local url="$1" out="$2"
            if retry_curl "$url" "$out"; then
              echo "Atualizado: $out"
            else
              echo "::warning::Sem resposta válida para $out; mantendo arquivo do repositório."
              git checkout -- "$out" 2>/dev/null || true
            fi
          }

          fetch_or_keep "${BASE}/api?username=davidwajch&show_icons=true&theme=tokyonight&include_all_commits=true&locale=pt-br&hide_border=true&cache_seconds=86400" assets/github-stats.svg
          fetch_or_keep "${BASE}/api/top-langs/?username=davidwajch&theme=tokyonight&layout=compact&custom_title=Tecnologias&langs_count=9&locale=pt-br&hide_border=true&cache_seconds=86400" assets/github-top-langs.svg

          if curl -fsSL --max-time 120 -A "Mozilla/5.0" "https://streak-stats.demolab.com?user=davidwajch&theme=tokyonight&hide_border=true&date_format=j%20M%5B%20Y%5D&locale=pt_BR" -o assets/github-streak.svg.part && grep -q '<svg' assets/github-streak.svg.part; then
            mv assets/github-streak.svg.part assets/github-streak.svg
          else
            rm -f assets/github-streak.svg.part
            echo "::warning::Streak não atualizado."
            git checkout -- assets/github-streak.svg 2>/dev/null || true
          fi

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/github-top-langs.svg assets/github-streak.svg
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore: atualizar SVGs das estatísticas do README"
          git push
