name: Update README stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

concurrency:
  group: update-readme-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar SVGs
        env:
          STATS_BASE: ${{ vars.README_STATS_URL }}
        run: |
          set -e
          BASE="${STATS_BASE:-https://github-readme-stats.vercel.app}"
          BASE="${BASE%/}"
          mkdir -p assets

          retry_curl() {
            local url="$1" out="$2"
            local n=0
            until curl -fsSL --max-time 90 "$url" -o "$out"; do
              n=$((n+1))
              if [ "$n" -ge 6 ]; then
                echo "::error::Falhou após 6 tentativas: $url"
                return 1
              fi
              sleep 20
            done
          }

          retry_curl "${BASE}/api?username=davidwajch&show_icons=true&theme=tokyonight&include_all_commits=true&locale=pt-br&hide_border=true&cache_seconds=86400" assets/github-stats.svg
          retry_curl "${BASE}/api/top-langs/?username=davidwajch&theme=tokyonight&layout=compact&custom_title=Tecnologias&langs_count=9&locale=pt-br&hide_border=true&cache_seconds=86400" assets/github-top-langs.svg

          if curl -fsSL --max-time 90 "https://streak-stats.demolab.com?user=davidwajch&theme=tokyonight&hide_border=true&date_format=j%20M%5B%20Y%5D&locale=pt_BR" -o assets/github-streak.svg.part; then
            mv assets/github-streak.svg.part assets/github-streak.svg
          else
            rm -f assets/github-streak.svg.part
            echo "::warning::Streak não atualizado; restaurando versão do repositório."
            git checkout -- assets/github-streak.svg 2>/dev/null || true
          fi

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/github-top-langs.svg assets/github-streak.svg
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore: atualizar SVGs das estatísticas do README"
          git push
